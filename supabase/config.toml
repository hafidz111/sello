# Jalankan migrasi lewat Supabase GitHub Integration atau CLI: supabase db push
# https://supabase.com/docs/guides/deployment/database-migrations

[project]
id = "sello"

[api]
enabled = true

[db]
major_version = 15

[db.migrations]
enabled = true

[storage]
enabled = true

# Firebase Auth as third-party provider (must also enable in Dashboard).
# Project ID from Firebase Console / firebase_options.dart
[auth.third_party.firebase]
enabled = true
project_id = "sello-62633"
